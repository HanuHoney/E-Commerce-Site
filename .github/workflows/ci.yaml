# CI for product-catalog-service

name: CI-for-product-catalog-service

on:
    pull_request:
        branches:
        - main

jobs:
    build:
        runs-on: ubuntu-latest  

        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: go setup
          uses: actions/setup-go@v2
          with:
            go-version: 1.22

        
        - name: build
          run: |
               cd services/product-catalog
               go mod download
               go build -o product-catalog-service main.go


        - name: unit-tests
          run: |
            cd services/product-catalog
            go test ./... 
    code-quality:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Go 1.22
          uses: actions/setup-go@v2
          with:
            go-version: 1.22

        - name: Run golangci-lint
          uses: golangci/golangci-lint-action@v6
          with:
            version: v1.59.1
            working-directory: services/product-catalog

    docker:
        runs-on: ubuntu-latest

        needs: build

        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Install Docker
          uses: docker/setup-buildx-action@v2

        - name: Login to DockerHub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKER_TOKEN }}

        - name: Docker Push
          uses: docker/build-push-action@v6
          with:
            context: .
            file: ./services/product-catalog/Dockerfile
            push: true
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/product-catalog-service:latest
        
    update-k8s:
        runs-on: ubuntu-latest
        needs: docker

        steps:
        - name: Checkout code
          uses: actions/checkout@v4
          with:
            fetch-depth: 0
            token: ${{ secrets.GITHUB_TOKEN }}

        - name: update tag in k8s deployment manifest
          run: |
            sed -i 's|image: .*|image: '"${{ secrets.DOCKERHUB_USERNAME }}"'/product-catalog-service:latest|g' ./k8s/product-catalog-deployment.yaml

        - name: Commit and Push changes
          run: |
            git config --global user.name "hanuhoney"
            git config --global user.email "hanu.nagineni@gmail.com"
            git add ./k8s/product-catalog-deployment.yaml
            git commit -m "[CI]: Update product-catalog-service image tag to latest"
            git push origin HEAD:main -f